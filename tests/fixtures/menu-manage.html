<!DOCTYPE html>
<html>
<head><title>Main Menu | ColumbiaDoctors</title></head>
<body>
  <h1 id="page-title">Main Menu</h1>
  <form id="menu-overview-form">
    <table id="menu-overview" class="sticky-enabled">
      <thead>
        <tr><th>Menu link</th><th>Enabled</th><th>Weight</th><th>Operations</th></tr>
      </thead>
      <tbody>
        <tr class="draggable">
          <td><div class="indentation">&nbsp;</div><a href="/about">About Us</a></td>
          <td><input type="checkbox" class="form-checkbox" checked="checked" /></td>
          <td>
            <select class="menu-weight"><option value="-50"> -50</option><option value="0" selected="selected">0</option></select>
            <input type="hidden" name="menu[mlid]" value="123" />
            <input type="hidden" name="menu[plid]" value="0" />
          </td>
        </tr>
        <tr class="draggable">
          <td><div class="indentation">&nbsp;</div><div class="indentation">&nbsp;</div><a href="/doctors">Our Doctors</a></td>
          <td><input type="checkbox" class="form-checkbox" checked="checked" /></td>
          <td>
            <select class="menu-weight"><option value="0" selected="selected">0</option></select>
            <input type="hidden" name="menu[mlid]" value="456" />
            <input type="hidden" name="menu[plid]" value="123" />
          </td>
        </tr>
      </tbody>
    </table>
    <div class="form-actions">
      <input type="submit" id="edit-actions-submit" value="Save configuration" />
    </div>
  </form>
</body>
</html>
